<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monitoring Sensus - Resizeable List Wilayah</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            display: flex;
            background: #e9ecef;
        }

        /* ========== SIDEBAR ========== */
        #sidebar {
            width: 380px;
            height: 100vh;
            background: #f8fafc;
            border-right: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
        }

        /* Area ATAS (Header + Search) - bisa diatur tingginya */
        .sidebar-top {
            flex-shrink: 0;
            overflow: visible;
        }

        /* Header Sidebar */
        .sidebar-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 18px 16px;
            text-align: center;
            border-bottom: 3px solid #3b82f6;
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sidebar-header p {
            margin: 5px 0 0;
            font-size: 0.7rem;
            opacity: 0.85;
        }
        .badge-total {
            background: #3b82f6;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        /* Search Box */
        .search-box {
            padding: 14px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
        .search-box input, 
        .search-box select {
            width: 100%;
            padding: 9px 12px;
            margin-bottom: 8px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.85rem;
            outline: none;
        }
        .search-box input:focus, 
        .search-box select:focus {
            border-color: #3b82f6;
        }

        /* ========== SPLITTER (GARIS PENARIK VERTIKAL) ========== */
        .splitter {
            height: 6px;
            background: #cbd5e1;
            cursor: ns-resize;
            flex-shrink: 0;
            transition: background 0.2s;
            position: relative;
            z-index: 20;
        }
        .splitter:hover {
            background: #3b82f6;
        }
        .splitter:active {
            background: #2563eb;
        }
        
        /* Indikator garis saat drag vertikal */
        .resize-indicator-v {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #3b82f6;
            z-index: 9999;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 6px #3b82f6;
        }

        /* ========== AREA BAWAH (LIST WILAYAH) ========== */
        #dataList {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            scroll-behavior: smooth;
            min-height: 100px;
        }

        /* Item Wilayah */
        .item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .item:hover {
            background: #f1f5f9;
            border-color: #3b82f6;
            transform: translateX(3px);
        }
        .item h4 {
            margin: 0 0 5px 0;
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .item .kode-wilayah {
            font-size: 0.6rem;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 20px;
            font-family: monospace;
        }
        .item .jumlah-usaha {
            font-size: 0.75rem;
            color: #475569;
            margin: 4px 0;
        }
        .item .lokasi {
            font-size: 0.7rem;
            color: #475569;
            margin-top: 5px;
            padding-top: 4px;
            border-top: 1px dashed #cbd5e1;
        }
        .status-belum-data {
            background: #fef3c7;
            color: #b45309;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
        }
        .kategori-tag {
            font-size: 0.6rem;
            background: #e6f0ff;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 4px;
        }

        /* Scrollbar */
        #dataList::-webkit-scrollbar {
            width: 5px;
        }
        #dataList::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        #dataList::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        /* PETA */
        #map {
            flex: 1;
            height: 100vh;
            z-index: 1;
        }

        /* Tooltip tinggi list */
        .height-tooltip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .height-tooltip.show {
            opacity: 1;
        }

        /* Info resize */
        .resize-info {
            text-align: center;
            font-size: 0.6rem;
            color: #64748b;
            padding: 4px;
            background: #f1f5f9;
            border-radius: 4px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <!-- AREA ATAS ( bisa diatur tingginya via splitter ) -->
        <div class="sidebar-top" id="sidebarTop">
            <div class="sidebar-header">
                <h2>
                    📊 STATISTIK PER WILAYAH
                    <span class="badge-total" id="totalWilayahBadge">0</span>
                </h2>
                <p>2397 Wilayah | Tarik garis biru untuk mengatur tinggi list</p>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Cari nama RT / Dusun ..." autocomplete="off">
                <input type="text" id="searchIdsls" placeholder="🆔 Cari ID Wilayah (SLS)">
                <select id="filterKategori">
                    <option value="">📌 Semua Kategori</option>
                    <option value="Perkebunan">🌿 Perkebunan</option>
                    <option value="Sawah">🌾 Sawah / Pertanian</option>
                    <option value="Kebun">🍃 Kebun / Ladang</option>
                    <option value="Pemukiman">🏘️ Pemukiman</option>
                </select>
                <div class="resize-info">⬇️ Tarik garis biru di bawah ini ⬇️</div>
            </div>
        </div>

        <!-- SPLITTER VERTICAL (GARIS PENARIK) -->
        <div class="splitter" id="verticalSplitter"></div>

        <!-- AREA BAWAH (LIST WILAYAH) - Bisa di-resize tingginya -->
        <div id="dataList">
            <div style="text-align:center; padding:40px;">📡 Memuat data wilayah...</div>
        </div>
    </div>

    <!-- Indikator drag vertikal -->
    <div class="resize-indicator-v" id="resizeIndicatorV"></div>
    
    <!-- Tooltip tinggi -->
    <div class="height-tooltip" id="heightTooltip"></div>

    <!-- PETA -->
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ============================================================
        // DATA WILAYAH (Contoh)
        // ============================================================
        const wilayahData = [
            { id: "16010520010001", nama: "RT 01 DUSUN 1", kecamatan: "LENGKITI", desa: "BANDAR JAYA", usaha: 0, kategori: "Pemukiman", lat: -4.395, lng: 103.922 },
            { id: "16010520010002", nama: "RT 02 DUSUN 1", kecamatan: "LENGKITI", desa: "BANDAR JAYA", usaha: 0, kategori: "Pemukiman", lat: -4.397, lng: 103.924 },
            { id: "16010520010003", nama: "RT 03 DUSUN 1", kecamatan: "LENGKITI", desa: "BANDAR JAYA", usaha: 0, kategori: "Pemukiman", lat: -4.393, lng: 103.920 },
            { id: "16010520011001", nama: "PERKEBUNAN OMIBA", kecamatan: "LENGKITI", desa: "BANDAR JAYA", usaha: 0, kategori: "Perkebunan", lat: -4.380, lng: 103.910 },
            { id: "16010520020001", nama: "RT 01 DUSUN 01", kecamatan: "LENGKITI", desa: "KARANG ENDAH", usaha: 0, kategori: "Pemukiman", lat: -4.400, lng: 103.940 },
            { id: "16010520021001", nama: "PERKEBUNAN", kecamatan: "LENGKITI", desa: "KARANG ENDAH", usaha: 0, kategori: "Perkebunan", lat: -4.405, lng: 103.945 },
            { id: "16010520030001", nama: "RT 01 DUSUN 01", kecamatan: "LENGKITI", desa: "PAJAR BULAN", usaha: 0, kategori: "Pemukiman", lat: -4.410, lng: 103.960 },
            { id: "16010520040001", nama: "RT 02 DUSUN 01", kecamatan: "LENGKITI", desa: "PAGAR DEWA", usaha: 0, kategori: "Pemukiman", lat: -4.415, lng: 103.970 },
            { id: "16010520041001", nama: "KEBUN", kecamatan: "LENGKITI", desa: "PAGAR DEWA", usaha: 0, kategori: "Kebun", lat: -4.418, lng: 103.975 },
            { id: "16010520050001", nama: "RT 02 DUSUN 1", kecamatan: "LENGKITI", desa: "TANJUNG LENGKAYAP", usaha: 0, kategori: "Pemukiman", lat: -4.420, lng: 103.985 },
            { id: "16010520051001", nama: "PERKEBUNAN KARET", kecamatan: "LENGKITI", desa: "TANJUNG LENGKAYAP", usaha: 0, kategori: "Perkebunan", lat: -4.425, lng: 103.990 },
            { id: "16010700010001", nama: "RT 01 DUSUN 1", kecamatan: "SOSOH BUAY RAYAP", desa: "NEGERI SINDANG", usaha: 0, kategori: "Pemukiman", lat: -4.120, lng: 104.060 },
            { id: "16010700011001", nama: "KEBUN KARET", kecamatan: "SOSOH BUAY RAYAP", desa: "NEGERI SINDANG", usaha: 0, kategori: "Perkebunan", lat: -4.115, lng: 104.065 },
            { id: "16010800080001", nama: "RT 001 DUSUN I", kecamatan: "PENGANDONAN", desa: "GUNUNG MERAKSA", usaha: 0, kategori: "Pemukiman", lat: -4.040, lng: 104.120 },
            { id: "16010800081001", nama: "SAWAH DAN HUTAN", kecamatan: "PENGANDONAN", desa: "GUNUNG MERAKSA", usaha: 0, kategori: "Sawah", lat: -4.035, lng: 104.125 },
            { id: "16010800100001", nama: "RT 001 DUSUN I", kecamatan: "PENGANDONAN", desa: "TANJUNG PURA", usaha: 0, kategori: "Pemukiman", lat: -4.045, lng: 104.130 },
            { id: "16010810110001", nama: "RT 01 DUSUN 1", kecamatan: "SEMIDANG AJI", desa: "TUBOHAN", usaha: 0, kategori: "Pemukiman", lat: -4.180, lng: 104.085 }
        ];

        // Tambahkan lokasi
        wilayahData.forEach(w => {
            w.lokasi = `${w.kecamatan} | ${w.desa}`;
        });

        // ========== INISIALISASI PETA ==========
        const map = L.map('map').setView([-4.2, 104.0], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB',
            maxZoom: 18
        }).addTo(map);

        let markerLayer = L.layerGroup().addTo(map);

        function updateMarkers(data) {
            markerLayer.clearLayers();
            data.forEach(wil => {
                if (wil.lat && wil.lng) {
                    const marker = L.marker([wil.lat, wil.lng]).addTo(markerLayer);
                    marker.bindPopup(`
                        <b>${wil.nama}</b><br>
                        ID: ${wil.id}<br>
                        📍 ${wil.lokasi}<br>
                        🏷️ ${wil.kategori}
                    `);
                }
            });
        }

        // ========== RENDER SIDEBAR ==========
        function renderWilayah(data) {
            const container = document.getElementById('dataList');
            const totalBadge = document.getElementById('totalWilayahBadge');
            
            totalBadge.innerText = data.length;
            
            if (data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">🔍 Tidak ada wilayah yang cocok</div>';
                updateMarkers([]);
                return;
            }
            
            let html = '';
            data.forEach(w => {
                html += `
                    <div class="item" data-id="${w.id}" data-lat="${w.lat || 0}" data-lng="${w.lng || 0}" data-nama="${w.nama}">
                        <h4>
                            ${w.nama}
                            <span class="kode-wilayah">${w.id}</span>
                        </h4>
                        <div class="jumlah-usaha">
                            <span class="status-belum-data">${w.usaha} usaha</span>
                        </div>
                        <div class="lokasi">
                            📍 ${w.lokasi}
                        </div>
                        <div class="kategori-tag">
                            🏷️ ${w.kategori}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            updateMarkers(data);
            
            // Event klik item
            document.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', () => {
                    const lat = parseFloat(el.getAttribute('data-lat'));
                    const lng = parseFloat(el.getAttribute('data-lng'));
                    const nama = el.getAttribute('data-nama');
                    if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                        map.setView([lat, lng], 14);
                    } else {
                        alert(`📍 ${nama}\nKoordinat belum tersedia.`);
                    }
                });
            });
        }

        // Filter data
        function filterData() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const idKeyword = document.getElementById('searchIdsls').value.toLowerCase();
            const kategori = document.getElementById('filterKategori').value;
            
            const filtered = wilayahData.filter(item => {
                let matchNama = item.nama.toLowerCase().includes(keyword) || 
                                item.lokasi.toLowerCase().includes(keyword);
                let matchId = item.id.toLowerCase().includes(idKeyword);
                let matchKategori = kategori === "" || item.kategori === kategori;
                return matchNama && matchId && matchKategori;
            });
            renderWilayah(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('searchIdsls').addEventListener('input', filterData);
        document.getElementById('filterKategori').addEventListener('change', filterData);
        
        renderWilayah(wilayahData);

        // ========== FITUR RESIZE VERTIKAL (TARIK KE BAWAH/ATAS) ==========
        const sidebarTop = document.getElementById('sidebarTop');
        const dataList = document.getElementById('dataList');
        const splitter = document.getElementById('verticalSplitter');
        const resizeIndicatorV = document.getElementById('resizeIndicatorV');
        const heightTooltip = document.getElementById('heightTooltip');
        
        let isResizingV = false;
        let startY = 0;
        let startTopHeight = 0;
        
        splitter.addEventListener('mousedown', (e) => {
            isResizingV = true;
            startY = e.clientY;
            startTopHeight = sidebarTop.offsetHeight;
            
            // Tampilkan indikator
            resizeIndicatorV.style.display = 'block';
            resizeIndicatorV.style.top = sidebarTop.offsetHeight + 'px';
            
            // Ganti cursor
            document.body.style.cursor = 'ns-resize';
            document.body.style.userSelect = 'none';
            
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isResizingV) return;
            
            // Hitung tinggi baru untuk area atas
            const deltaY = e.clientY - startY;
            let newTopHeight = startTopHeight + deltaY;
            
            // Batasi tinggi area atas (min 150px, max 350px)
            newTopHeight = Math.min(350, Math.max(150, newTopHeight));
            
            // Update indikator posisi
            resizeIndicatorV.style.top = newTopHeight + 'px';
            
            // Tampilkan tooltip
            const listHeight = window.innerHeight - newTopHeight - splitter.offsetHeight;
            heightTooltip.innerText = `📋 Daftar wilayah: ${Math.round(listHeight)}px`;
            heightTooltip.classList.add('show');
            
            clearTimeout(window.vTooltipTimeout);
            window.vTooltipTimeout = setTimeout(() => {
                heightTooltip.classList.remove('show');
            }, 500);
        });
        
        document.addEventListener('mouseup', (e) => {
            if (!isResizingV) return;
            
            // Hitung tinggi akhir
            const deltaY = e.clientY - startY;
            let finalTopHeight = startTopHeight + deltaY;
            finalTopHeight = Math.min(350, Math.max(150, finalTopHeight));
            
            // Terapkan tinggi baru ke area atas
            sidebarTop.style.height = finalTopHeight + 'px';
            
            // Sembunyikan indikator
            resizeIndicatorV.style.display = 'none';
            heightTooltip.classList.remove('show');
            
            // Reset cursor
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            
            isResizingV = false;
            
            // Peta tetap stabil
            setTimeout(() => {
                map.invalidateSize();
            }, 100);
        });
        
        // Set tinggi awal area atas (biarkan fleksibel)
        sidebarTop.style.height = 'auto';
        
        // Tambahkan marker kecamatan
        const kecamatanPoints = [
            { lat: -4.393, lng: 103.921, name: "Kec. LENGKITI" },
            { lat: -4.113, lng: 104.062, name: "Kec. SOSOH BUAY RAYAP" },
            { lat: -4.039, lng: 104.124, name: "Kec. PENGANDONAN" }
        ];
        kecamatanPoints.forEach(point => {
            L.marker([point.lat, point.lng]).addTo(map).bindPopup(`<b>${point.name}</b>`);
        });
        
        console.log('✅ Fitur tarik vertikal siap! Tarik garis biru di tengah sidebar untuk mengatur tinggi daftar wilayah.');
    </script>
</body>
</html>
